---
# Учебный плейбук — каркас. Задачи добавятся в следующих коммитах.
- name: WordPress deploy (scaffold)
  hosts: web
  become: true
  tasks:

  - name: Install MySQL server
    ansible.builtin.apt:
      name: mysql-server
      state: present

  - name: Create WordPress database
    community.mysql.mysql_db:
      name: "{{ wp_db_name }}"
      state: present

  - name: Create WordPress DB user
    community.mysql.mysql_user:
      name: "{{ wp_db_user }}"
      password: "{{ db_password }}"
      priv: "{{ wp_db_name }}.*:ALL"
      state: present
